<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revisor Académico</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #0f0f0f;
      --bg3: #141414;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --text: #e8e4d8;
      --text-dim: #888;
      --text-muted: #444;
      --accent: #d4cfc4;
      --green: #4ade80;
      --green-bg: #0a110a;
      --green-border: #1a3a1a;
      --red: #f87171;
      --red-bg: #110a0a;
      --red-border: #3a1a1a;
      --blue: #60a5fa;
      --blue-bg: #0a0e18;
      --blue-border: #1a2a4a;
      --purple: #a78bfa;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #f0ede6;
    }

    header span {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
    }

    /* Layout */
    .layout {
      display: flex;
      height: calc(100vh - 73px);
    }

    /* Left panel */
    .panel-left {
      width: 44%;
      border-right: 1px solid var(--border);
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: width 0.4s ease;
    }

    .panel-left.full { width: 100%; border-right: none; }

    .panel-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      color: #ddd;
      font-size: 14px;
      line-height: 1.8;
      resize: none;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      min-height: 300px;
    }

    textarea:focus { border-color: var(--border2); }
    textarea::placeholder { color: #333; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn-analyze {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 12px 26px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, background 0.2s;
    }

    .btn-analyze:disabled {
      background: var(--bg3);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-analyze:not(:disabled):hover { opacity: 0.85; }

    .word-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    .error-msg {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
    }

    .loading-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse { 0%,100%{opacity:0.15} 50%{opacity:1} }

    /* Right panel */
    .panel-right {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }

    /* Summary card */
    .summary-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .summary-quote {
      font-family: 'DM Serif Display', serif;
      font-size: 16px;
      color: var(--accent);
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .scores {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .score-ring-wrap { position: relative; width: 72px; height: 72px; }

    .score-ring-wrap svg {
      transform: rotate(-90deg);
      width: 72px; height: 72px;
    }

    .score-ring-wrap .score-num {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: white;
    }

    .score-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--bg2);
      border-radius: 8px;
      padding: 4px;
      width: fit-content;
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      text-transform: capitalize;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: var(--bg3);
      color: var(--text);
    }

    /* Tag lists */
    .section-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .section-title:first-child { margin-top: 0; }

    .tag {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .tag.fortaleza { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
    .tag.problema   { background: var(--red-bg);   border: 1px solid var(--red-border);   color: var(--red); }
    .tag.sugerencia { background: var(--blue-bg);  border: 1px solid var(--blue-border);  color: var(--blue); }

    /* Fragmentos */
    .fragmento-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .frag-section {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .frag-section:last-child { border-bottom: none; }
    .frag-section.original { background: var(--bg2); }
    .frag-section.problema-bg { background: var(--red-bg); }
    .frag-section.reescritura { background: var(--green-bg); }

    .frag-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .frag-label.orig { color: var(--text-muted); }
    .frag-label.prob { color: var(--red); }
    .frag-label.rewri { color: var(--green); }

    .frag-text {
      font-size: 13px;
      line-height: 1.6;
    }

    .frag-text.orig { color: #999; font-style: italic; }
    .frag-text.prob { color: var(--red); }
    .frag-text.rewri { color: var(--green); }

    /* hidden */
    .hidden { display: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .layout { flex-direction: column; height: auto; }
      .panel-left, .panel-left.full { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      header { padding: 20px 20px; }
      .panel-left, .panel-right { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Revisor Académico</h1>
  <span>COHERENCIA · ESTILO · REDACCIÓN</span>
</header>

<div class="layout">
  <!-- LEFT -->
  <div class="panel-left full" id="panelLeft">
    <div>
      <div class="panel-label">Texto a revisar</div>
      <textarea id="inputText" placeholder="Pega aquí tu fragmento de ensayo, marco teórico, introducción o cualquier sección que quieras revisar..."></textarea>
    </div>
    <div class="toolbar">
      <button class="btn-analyze" id="btnAnalyze" onclick="analizar()">Analizar texto</button>
      <span class="word-count" id="wordCount"></span>
    </div>
    <div class="error-msg hidden" id="errorMsg"></div>
    <div class="loading-dots hidden" id="loadingDots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="panel-right hidden" id="panelRight">

    <!-- Summary -->
    <div class="summary-card">
      <p class="summary-quote" id="resumenGeneral"></p>
      <div class="scores">
        <div class="score-item">
          <div class="score-ring-wrap">
            <svg viewBox="0 0 72 72">
              <circle cx="36" cy="36" r="28" fill="none" stroke="#1a1a1a" stroke-width="5"/>
              <circle id="ringCoherencia" cx="36" cy="36" r="28" fill="none" stroke="var(--purple)" stroke-width="5" stroke-linecap="round" stroke-dasharray="0 175.9"/>
            </svg>
            <span class="score-num" id="numCoherencia">—</span>
          </div>
          <span class="score-label">Coherencia</span>
        </div>
        <div class="score-item">
          <div class="score-ring-wrap">
            <svg viewBox="0 0 72 72">
              <circle cx="36" cy="36" r="28" fill="none" stroke="#1a1a1a" stroke-width="5"/>
              <circle id="ringEstilo" cx="36" cy="36" r="28" fill="none" stroke="var(--green)" stroke-width="5" stroke-linecap="round" stroke-dasharray="0 175.9"/>
            </svg>
            <span class="score-num" id="numEstilo">—</span>
          </div>
          <span class="score-label">Estilo</span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('coherencia')">coherencia</button>
        <button class="tab-btn" onclick="switchTab('estilo')">estilo</button>
        <button class="tab-btn" onclick="switchTab('fragmentos')">fragmentos</button>
      </div>

      <div id="tab-coherencia" class="tab-content">
        <div class="section-title">Fortalezas</div>
        <div id="coh-fortalezas"></div>
        <div class="section-title">Problemas</div>
        <div id="coh-problemas"></div>
        <div class="section-title">Sugerencias</div>
        <div id="coh-sugerencias"></div>
      </div>

      <div id="tab-estilo" class="tab-content hidden">
        <div class="section-title">Fortalezas</div>
        <div id="est-fortalezas"></div>
        <div class="section-title">Problemas</div>
        <div id="est-problemas"></div>
        <div class="section-title">Sugerencias</div>
        <div id="est-sugerencias"></div>
      </div>

      <div id="tab-fragmentos" class="tab-content hidden">
        <div id="fragmentos-list"></div>
      </div>
    </div>

  </div>
</div>

<script>
const SYSTEM_PROMPT = `Eres un revisor académico experto especializado en ciencias sociales, estudios culturales y humanidades. Tu tarea es analizar textos académicos escritos en español y entregar un diagnóstico riguroso en DOS dimensiones:

1. COHERENCIA ARGUMENTATIVA: Evalúa si la tesis es clara, si los argumentos la sostienen, si hay progresión lógica entre párrafos, si existen contradicciones o saltos argumentales, y si la conclusión responde a lo planteado.

2. ESTILO Y REDACCIÓN ACADÉMICA: Evalúa el registro formal, la precisión conceptual, el uso de conectores lógicos, la sintaxis, la economía del lenguaje (verbosidad innecesaria), y la adecuación al género académico.

Responde SIEMPRE en el siguiente formato JSON (sin backticks ni markdown):
{
  "resumen_general": "Una oración que sintetiza el estado general del texto",
  "puntaje_coherencia": número del 1 al 10,
  "puntaje_estilo": número del 1 al 10,
  "coherencia": {
    "fortalezas": ["lista de puntos fuertes"],
    "problemas": ["lista de problemas identificados"],
    "sugerencias": ["lista de sugerencias concretas"]
  },
  "estilo": {
    "fortalezas": ["lista de puntos fuertes"],
    "problemas": ["lista de problemas identificados"],
    "sugerencias": ["lista de sugerencias concretas"]
  },
  "fragmentos_criticos": [
    {
      "fragmento": "texto exacto del fragmento problemático (máx 30 palabras)",
      "problema": "descripción del problema",
      "reescritura": "versión mejorada del fragmento"
    }
  ]
}

Sé preciso, directo y académicamente riguroso. No suavices los problemas reales.`;

const textarea = document.getElementById('inputText');
const wordCount = document.getElementById('wordCount');

textarea.addEventListener('input', () => {
  const words = textarea.value.trim().split(/\s+/).filter(Boolean).length;
  wordCount.textContent = words > 0 ? `${words} palabras` : '';
});

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.remove('hidden');
  event.target.classList.add('active');
}

function setRing(ringId, score) {
  const circ = 2 * Math.PI * 28;
  const filled = (score / 10) * circ;
  document.getElementById(ringId).setAttribute('stroke-dasharray', `${filled} ${circ - filled}`);
}

function renderTags(containerId, items, type) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(item => `<div class="tag ${type}">${item}</div>`).join('');
}

async function analizar() {
  const texto = textarea.value.trim();
  const errorEl = document.getElementById('errorMsg');
  const loadingEl = document.getElementById('loadingDots');
  const btn = document.getElementById('btnAnalyze');

  errorEl.classList.add('hidden');

  if (texto.length < 100) {
    errorEl.textContent = 'El texto debe tener al menos 100 caracteres para un análisis útil.';
    errorEl.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  loadingEl.classList.remove('hidden');
  document.getElementById('panelRight').classList.add('hidden');
  document.getElementById('panelLeft').classList.add('full');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: `Analiza este texto académico:\n\n${texto}` }]
      })
    });

    const data = await response.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    // Populate UI
    document.getElementById('resumenGeneral').textContent = `"${result.resumen_general}"`;
    document.getElementById('numCoherencia').textContent = result.puntaje_coherencia;
    document.getElementById('numEstilo').textContent = result.puntaje_estilo;

    setTimeout(() => {
      setRing('ringCoherencia', result.puntaje_coherencia);
      setRing('ringEstilo', result.puntaje_estilo);
    }, 100);

    renderTags('coh-fortalezas', result.coherencia.fortalezas, 'fortaleza');
    renderTags('coh-problemas', result.coherencia.problemas, 'problema');
    renderTags('coh-sugerencias', result.coherencia.sugerencias, 'sugerencia');
    renderTags('est-fortalezas', result.estilo.fortalezas, 'fortaleza');
    renderTags('est-problemas', result.estilo.problemas, 'problema');
    renderTags('est-sugerencias', result.estilo.sugerencias, 'sugerencia');

    const fragList = document.getElementById('fragmentos-list');
    if (result.fragmentos_criticos?.length > 0) {
      fragList.innerHTML = result.fragmentos_criticos.map(f => `
        <div class="fragmento-card">
          <div class="frag-section original">
            <div class="frag-label orig">FRAGMENTO ORIGINAL</div>
            <div class="frag-text orig">«${f.fragmento}»</div>
          </div>
          <div class="frag-section problema-bg">
            <div class="frag-label prob">PROBLEMA</div>
            <div class="frag-text prob">${f.problema}</div>
          </div>
          <div class="frag-section reescritura">
            <div class="frag-label rewri">REESCRITURA SUGERIDA</div>
            <div class="frag-text rewri">${f.reescritura}</div>
          </div>
        </div>
      `).join('');
    } else {
      fragList.innerHTML = '<p style="color:var(--text-muted);font-size:14px">No se identificaron fragmentos críticos específicos.</p>';
    }

    // Show results
    document.getElementById('panelLeft').classList.remove('full');
    document.getElementById('panelRight').classList.remove('hidden');

    // Reset tabs
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-coherencia').classList.remove('hidden');
    document.querySelectorAll('.tab-btn')[0].classList.add('active');

  } catch (e) {
    errorEl.textContent = 'Error al analizar el texto. Intenta nuevamente.';
    errorEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    loadingEl.classList.add('hidden');
  }
}
</script>

</body>
</html>
